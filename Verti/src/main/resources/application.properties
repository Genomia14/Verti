# ====================
# Server Settings
# ====================
server.port=8080
server.servlet.context-path=/

# ====================
# JSP View Resolver Settings
# ====================
spring.mvc.view.prefix=/
spring.mvc.view.suffix=.jsp

# ====================
# MariaDB Database Settings
# ====================
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/verti?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useUnicode=true
spring.datasource.username=root
spring.datasource.password=1234

# ====================
# HikariCP Connection Pool Settings
# ====================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ====================
# UTF-8 Encoding Settings
# ====================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
